version: "3.9"

services:

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  api:
    build: ./api
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iaverse
    volumes:
      - postgres_data:/var/lib/postgresql/data

  workers:
    build: ./workers
    depends_on:
      - api
      - redis
      - postgres

volumes:
  postgres_data:
