version: "3.9"
services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DEV_MODE=true
  sandbox-worker:
    image: laverse/tool-runner:latest
    command: ["python", "-c", "print('sandbox worker ready')"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
