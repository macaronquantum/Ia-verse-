<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA-Verse — Liquid Glass 3D World</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <div class="grid-overlay"></div>

  <header class="glass-header">
    <div class="logo">
      <div class="logo-cube">
        <div class="cube-face front"></div>
        <div class="cube-face back"></div>
        <div class="cube-face left"></div>
        <div class="cube-face right"></div>
        <div class="cube-face top"></div>
        <div class="cube-face bottom"></div>
      </div>
      <h1>IA-VERSE</h1>
    </div>
    <p class="subtitle">Liquid Glass 3D World Simulation</p>
  </header>

  <main>
    <section class="controls glass-panel" id="controls">
      <h2>Control Panel</h2>
      <div class="control-row">
        <div class="input-group">
          <label for="world-name">World Name</label>
          <input type="text" id="world-name" placeholder="Enter world name..." value="Genesis">
        </div>
        <button class="btn btn-create" onclick="createWorld()">
          <span class="btn-glow"></span>
          Create World
        </button>
      </div>
      <div class="control-row" id="agent-controls" style="display:none">
        <div class="input-group">
          <label for="agent-name">Agent Name</label>
          <input type="text" id="agent-name" placeholder="Agent name...">
        </div>
        <button class="btn btn-agent" onclick="createAgent()">Add Agent</button>
        <div class="input-group small">
          <label for="tick-steps">Ticks</label>
          <input type="number" id="tick-steps" value="5" min="1" max="100">
        </div>
        <button class="btn btn-tick" onclick="runTick()">
          <span class="btn-glow"></span>
          Run Simulation
        </button>
        <button class="btn btn-auto" id="auto-btn" onclick="toggleAutoTick()">Auto</button>
      </div>
    </section>

    <div class="dashboard" id="dashboard" style="display:none">
      <section class="glass-panel stats-grid">
        <div class="stat-card">
          <div class="stat-icon energy-icon">
            <div class="pulse-ring"></div>
          </div>
          <div class="stat-info">
            <span class="stat-label">Energy</span>
            <span class="stat-value" id="res-energy">10,000</span>
          </div>
          <div class="stat-bar"><div class="stat-fill energy-fill" id="bar-energy"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon food-icon">
            <div class="pulse-ring"></div>
          </div>
          <div class="stat-info">
            <span class="stat-label">Food</span>
            <span class="stat-value" id="res-food">10,000</span>
          </div>
          <div class="stat-bar"><div class="stat-fill food-fill" id="bar-food"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon metal-icon">
            <div class="pulse-ring"></div>
          </div>
          <div class="stat-info">
            <span class="stat-label">Metal</span>
            <span class="stat-value" id="res-metal">10,000</span>
          </div>
          <div class="stat-bar"><div class="stat-fill metal-fill" id="bar-metal"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon knowledge-icon">
            <div class="pulse-ring"></div>
          </div>
          <div class="stat-info">
            <span class="stat-label">Knowledge</span>
            <span class="stat-value" id="res-knowledge">10,000</span>
          </div>
          <div class="stat-bar"><div class="stat-fill knowledge-fill" id="bar-knowledge"></div></div>
        </div>
      </section>

      <div class="panels-row">
        <section class="glass-panel market-panel">
          <h2>Market Prices</h2>
          <div class="price-grid" id="price-grid"></div>
        </section>

        <section class="glass-panel bank-panel">
          <h2>Central Bank</h2>
          <div class="bank-stats">
            <div class="bank-stat">
              <span class="bank-label">Reserve</span>
              <span class="bank-value" id="bank-reserve">100,000</span>
            </div>
            <div class="bank-stat">
              <span class="bank-label">Active Loans</span>
              <span class="bank-value" id="bank-loans">0</span>
            </div>
            <div class="bank-stat">
              <span class="bank-label">Total Debt</span>
              <span class="bank-value" id="bank-debt">0</span>
            </div>
          </div>
        </section>
      </div>

      <div class="panels-row">
        <section class="glass-panel agents-panel">
          <h2>Agents <span class="badge" id="agent-count">0</span></h2>
          <div class="agent-grid" id="agent-grid"></div>
        </section>

        <section class="glass-panel companies-panel">
          <h2>Companies <span class="badge" id="company-count">0</span></h2>
          <div class="company-grid" id="company-grid"></div>
        </section>
      </div>

      <section class="glass-panel log-panel">
        <h2>Event Log <span class="badge" id="tick-badge">Tick 0</span></h2>
        <div class="log-scroll" id="event-log"></div>
      </section>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
