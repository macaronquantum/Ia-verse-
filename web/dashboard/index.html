<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA-Verse</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="app">
        <nav id="navbar">
            <div class="nav-brand">
                <div class="brand-dot"></div>
                <span class="brand-text">ia-verse</span>
            </div>
            <div class="nav-links">
                <button class="nav-btn active" data-view="map" onclick="switchView('map')">Map</button>
                <button class="nav-btn" data-view="agents" onclick="switchView('agents')">Agents</button>
                <button class="nav-btn" data-view="economy" onclick="switchView('economy')">Economy</button>
            </div>
            <div class="nav-right">
                <div class="sim-controls">
                    <button class="ctrl-btn" id="btn-create" onclick="createWorld()" title="Create World">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    </button>
                    <button class="ctrl-btn" id="btn-start" onclick="startSim()" title="Start">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <button class="ctrl-btn" id="btn-pause" onclick="pauseSim()" title="Pause">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </button>
                    <button class="ctrl-btn" id="btn-stop" onclick="stopSim()" title="Stop">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                    </button>
                </div>
                <div class="status-pill" id="status-pill">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-label">Offline</span>
                </div>
                <span class="tick-label" id="tick-label">Tick 0</span>
            </div>
        </nav>

        <div id="view-map" class="view active">
            <div id="map-container"></div>
            <div class="map-overlay-left">
                <div class="glass-card stats-row">
                    <div class="stat-mini"><span class="stat-n" id="s-agents">0</span><span class="stat-l">agents</span></div>
                    <div class="stat-mini"><span class="stat-n" id="s-companies">0</span><span class="stat-l">companies</span></div>
                    <div class="stat-mini"><span class="stat-n" id="s-money">$0</span><span class="stat-l">supply</span></div>
                </div>
            </div>
            <div class="map-overlay-right">
                <div class="glass-card feed-card">
                    <div class="feed-header">Live Feed</div>
                    <div id="feed-items" class="feed-list"></div>
                </div>
            </div>
            <div id="agent-popup" class="agent-popup hidden"></div>
        </div>

        <div id="view-agents" class="view">
            <div class="page-layout">
                <div class="glass-card sidebar">
                    <div class="sidebar-header">
                        <h2>Agent Explorer</h2>
                        <span class="badge" id="agent-count-badge">0</span>
                    </div>
                    <input type="text" id="agent-search" placeholder="Search agents..." class="input" oninput="filterAgents()">
                    <div class="filter-row">
                        <select id="agent-type-filter" class="select" onchange="filterAgents()">
                            <option value="all">All types</option>
                            <option value="central_bank">Central Banks</option>
                            <option value="bank">Banks</option>
                            <option value="company">Companies</option>
                            <option value="state">States</option>
                            <option value="judge">Judges</option>
                            <option value="energy_provider">Energy</option>
                            <option value="citizen">Citizens</option>
                        </select>
                        <select id="agent-sort" class="select" onchange="filterAgents()">
                            <option value="wallet">Wealth</option>
                            <option value="influence">Influence</option>
                            <option value="name">Name</option>
                        </select>
                    </div>
                    <div id="agents-list" class="agent-list"></div>
                </div>
                <div class="glass-card detail-panel" id="detail-panel">
                    <div id="agent-profile">
                        <div class="empty-state">Select an agent to view details</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-economy" class="view">
            <div class="economy-page">
                <div class="metrics-row">
                    <div class="glass-card metric"><span class="metric-label">Money Supply</span><span class="metric-value" id="e-money">$0</span></div>
                    <div class="glass-card metric"><span class="metric-label">Agents</span><span class="metric-value" id="e-agents">0</span></div>
                    <div class="glass-card metric"><span class="metric-label">Companies</span><span class="metric-value" id="e-companies">0</span></div>
                    <div class="glass-card metric"><span class="metric-label">Gini Index</span><span class="metric-value" id="e-gini">0.00</span><div class="gini-bar"><div class="gini-fill" id="gini-fill"></div></div></div>
                    <div class="glass-card metric"><span class="metric-label">Bankrupt</span><span class="metric-value red" id="e-bankrupt">0</span></div>
                    <div class="glass-card metric"><span class="metric-label">Bank Reserve</span><span class="metric-value" id="e-reserve">$0</span></div>
                </div>
                <div class="panels-row">
                    <div class="glass-card">
                        <h3 class="card-title">Market Prices</h3>
                        <div id="prices-grid" class="prices-grid"></div>
                    </div>
                    <div class="glass-card">
                        <h3 class="card-title">Leaderboard</h3>
                        <div id="leaderboard" class="leaderboard"></div>
                    </div>
                </div>
                <div class="glass-card">
                    <h3 class="card-title">Global Resources</h3>
                    <div id="resources-bars"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
